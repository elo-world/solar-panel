<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Solar Panel</title>

        <!-- CSS -->
        <link rel="stylesheet" href="./css/index.css" />
    </head>
    <body>
        <header>
            <!-- <p>
                Solar Panel is a website that determines the optimal tilt angle for a solar panel throughout
                the year.
            </p> -->
        </header>
        <section class="interface">
            <div class="head">
                <div class="calendar animation">
                    <div class="header">
                        <p id="year"></p>
                        <div class="selected-month">
                            <button id="prev-month-button">
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="24"
                                    height="24"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    class="lucide lucide-arrow-left-icon lucide-arrow-left"
                                >
                                    <path d="m12 19-7-7 7-7" />
                                    <path d="M19 12H5" />
                                </svg>
                            </button>
                            <h2 id="month"></h2>
                            <button id="next-month-button">
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="24"
                                    height="24"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    class="lucide lucide-arrow-right-icon lucide-arrow-right"
                                >
                                    <path d="M5 12h14" />
                                    <path d="m12 5 7 7-7 7" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="days">
                        <div class="day">Mon</div>
                        <div class="day">Tue</div>
                        <div class="day">Wed</div>
                        <div class="day">Thu</div>
                        <div class="day">Fri</div>
                        <div class="day">Sat</div>
                        <div class="day">Sun</div>
                    </div>
                    <div class="dates" id="dates"></div>

                    <div class="footer">
                        <button id="today-button">Today</button>
                    </div>
                </div>
            </div>
            <div class="tail">
                <h2 id="season"></h2>
                <div class="tilt-box">
                    <h1 id="tilt" class="animation"></h1>
                    <img src="images/solar-panel.png" alt="Solar panel illustration" />
                </div>
            </div>
        </section>

        <!-- JS -->
        <script src="js/script.js"></script>
    </body>
</html>
